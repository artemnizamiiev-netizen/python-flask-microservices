name: Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest / ${{ matrix.service.name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: user-service
            requirements: user-service/requirements.txt
            tests: user-service/tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.7"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            ${{ matrix.service.requirements }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r ${{ matrix.service.requirements }}
          if [ -s requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            python -m pip install pytest
          fi

      - name: Run tests
        run: |
          pytest -q ${{ matrix.service.tests }}
